name: Windows Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Validate semantic version tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Tag '$tag' is not a strict semantic version (expected vMAJOR.MINOR.PATCH)."
            exit 1
          fi

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit $GITHUB_SHA is not contained in origin/main."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        shell: powershell
        run: choco install mingw -y

      - name: Build Windows executable
        shell: bash
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload asset to existing GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "target/x86_64-pc-windows-gnu/release/Rapid.exe" \
            --clobber
